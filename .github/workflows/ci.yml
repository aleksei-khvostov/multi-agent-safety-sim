name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Ruff and Pytest
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install package with dev dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run ruff
        run: python -m ruff check .

      - name: Run pytest
        run: python -m pytest

      - name: Run deterministic measurement gates
        run: |
          python -m multi_agent_safety_sim.cli rib-16 run
          python -m multi_agent_safety_sim.cli gravestone analyze data/fixtures/gravestone_golden --no-write-json
          python -m multi_agent_safety_sim.cli nested-delegation run